---

- name: "Setup job_logs directory"
  ansible.builtin.include_tasks: plays/log-dir.yml
  when: job_logs is undefined

- name: "Collect OCP logs"
  ansible.builtin.include_tasks: dump_ocp_logs.yml
  when: dci_gather_logs | bool

- name: Find console logs
  ansible.builtin.find:
    paths: "/var/consoles/{{ cluster_name }}/"
    patterns: '{{ cluster_name }}*'
    size: 1k
    recurse: false
  register: console_log_files

- name: Copy console logs into tmp directory
  ansible.builtin.fetch:
    src: "{{ item }}"
    dest: "{{ job_logs.path }}/{{ item | basename }}-console.log"
    flat: true
    validate_checksum: false
  loop: "{{ console_log_files.files | map(attribute='path') | list }}"

- name: "Find files to be uploaded to DCI (log,txt,html,yaml,yml,pcap,trace,csv)"
  ansible.builtin.find:
    paths: "{{ job_logs.path }}"
    patterns: "*.log,*.txt,*.html,*.yaml,*.yml,*.pcap,*.trace,*.csv"
  register: logs_matched
  tags: [dci]

- name: "Upload logs (text)"
  vars:
    mime_type: "text/plain"
  ansible.builtin.include_tasks: upload_logs.yml
  with_items: "{{ logs_matched.files }}"
  tags: [dci]

- name: "Find JSON files"
  ansible.builtin.find:
    paths: "{{ job_logs.path }}"
    patterns: "*.json"
    excludes: "dci-extra.*.json"
  register: json_matched
  tags: [dci]

- name: "Upload JSON files"
  vars:
    mime_type: "application/json"
  ansible.builtin.include_tasks: upload_logs.yml
  with_items: "{{ json_matched.files }}"
  tags: [dci]

- name: "Find deployment JUnit files"
  ansible.builtin.find:
    paths: "{{ job_logs.path }}"
    patterns: "*.xml"
  register: logs_matched
  tags: [dci]

- name: "Upload JUnit files"
  vars:
    mime_type: "application/junit"
    remove_ext: true
  ansible.builtin.include_tasks: upload_logs.yml
  with_items: "{{ logs_matched.files }}"
  tags: [dci]

- name: "Find deployment compressed files"
  ansible.builtin.find:
    paths: "{{ job_logs.path }}"
    patterns: "*.gz"
  register: logs_matched
  tags: [dci]

- name: "Upload compressed files to DCI Control Server"
  vars:
    mime_type: "application/x-gzip"
  ansible.builtin.include_tasks: upload_logs.yml
  with_items: "{{ logs_matched.files }}"
  tags: [dci]

- name: "Remove log dir"
  ansible.builtin.file:
    path: "{{ job_logs.path }}"
    state: absent
...
